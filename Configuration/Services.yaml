services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Kit\DigitalPageFlip\:
    resource: '../Classes/*'

  # Services used via container in DataHandlerHook (no DI possible in hooks)
  Kit\DigitalPageFlip\Service\PdfConversionService:
    public: true

  Kit\DigitalPageFlip\Service\FlipbookCleanupService:
    public: true

  Kit\DigitalPageFlip\EventListener\AfterFileAddedListener:
    tags:
      - name: event.listener
        identifier: 'digital-page-flip/after-file-added'
        event: TYPO3\CMS\Core\Resource\Event\AfterFileAddedEvent

  Kit\DigitalPageFlip\Command\ConvertPdfCommand:
    tags:
      - name: console.command
        command: 'digitalpageflip:convert'
        description: 'Convert PDF files of flipbook records to page images'

  Kit\DigitalPageFlip\Command\CleanupCommand:
    tags:
      - name: console.command
        command: 'digitalpageflip:cleanup'
        description: 'Find and remove orphaned FAL files and folders from deleted flipbooks'
